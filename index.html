<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMarket Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f8f9fa;
            --panel-bg: #ffffff;
            --primary-color: #2b2d42; /* Logotipga qarab buni o'zgartiramiz */
            --accent-color: #8d99ae;
            --text-color: #2b2d42;
            --danger-color: #d90429;
            --warning-color: #f39c12;
            --success-color: #2ecc71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* 1. Kirish Animatsiyasi (Welcome Overlay) */
        #welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .welcome-text {
            color: #ffffff;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.2s forwards 0.3s;
        }

        .welcome-sub {
            color: var(--accent-color);
            margin-top: 10px;
            font-size: 1rem;
            opacity: 0;
            animation: fadeIn 1.5s forwards 0.8s;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 2. Asosiy Interfeys */
        header {
            background: var(--panel-bg);
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .search-box {
            position: relative;
            width: 100%;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 25px;
            outline: none;
            transition: all 0.3s;
            background: #f1f5f9;
        }

        .search-box input:focus {
            border-color: var(--primary-color);
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-color);
        }

        /* Ogohlantirishlar paneli */
        .alerts-container {
            padding: 15px 20px 0 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alert-item {
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        .alert-warning { background: #fff3cd; color: #856404; border-left: 5px solid var(--warning-color); }
        .alert-danger { background: #f8d7da; color: #721c24; border-left: 5px solid var(--danger-color); }

        @keyframes slideIn {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Mahsulotlar Grid Tizimi */
        .main-container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        /* Premium Mahsulot Kartasi */
        .product-card {
            background: var(--panel-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
        }

        .image-container {
            position: relative;
            width: 100%;
            padding-top: 100%; /* 1:1 Aspect Ratio */
            background: #f1f5f9;
        }

        .image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Rasm ustidagi info panel (Pastki qismida joylashgan) */
        .image-overlay-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .stock-count {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .product-price {
            font-weight: 600;
            color: var(--primary-color);
        }

        .product-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        /* Status belgilari */
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-out { background: #ffe5e5; color: var(--danger-color); }
        .status-active { background: #e8f8f5; color: var(--success-color); }

        /* Yangi mahsulot qo'shish formasi (Yashirin/Ochiladi) */
        .add-btn-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary-color);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            z-index: 99;
            transition: transform 0.3s;
        }

        .add-btn-float:hover { transform: scale(1.1) rotate(90deg); }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
            transform: scale(0.8);
            transition: all 0.3s ease;
        }

        .modal.active .modal-content { transform: scale(1); }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .close-modal {
            float: right;
            cursor: pointer;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <div class="welcome-text">IMARKET</div>
        <div class="welcome-sub">Xush kelibsiz, Boss! Panel tayyorlanmoqda...</div>
    </div>

    <header>
        <div class="header-top">
            <div class="logo-area"><i class="fa-solid fa-cubes"></i> IMarket</div>
            <div style="font-size: 0.85rem; color: var(--accent-color);"><i class="fa-solid fa-user-shield"></i> Faqat siz uchun</div>
        </div>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Mahsulot nomini yozib qidiring..." oninput="filterProducts()">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </header>

    <div class="alerts-container" id="alerts-zone">
        </div>

    <main class="main-container">
        <div class="products-grid" id="products-container">
            </div>
    </main>

    <div class="add-btn-float" onclick="toggleModal(true)"><i class="fa-solid fa-plus"></i></div>

    <div class="modal" id="product-modal">
        <div class="modal-content">
            <i class="fa-solid fa-xmark close-modal" onclick="toggleModal(false)"></i>
            <h3 style="margin-bottom: 15px;">Yangi Maxsulot Qo'shish</h3>
            <form id="product-form" onsubmit="saveProduct(event)">
                <div class="form-group">
                    <label>Mahsulot Nomi</label>
                    <input type="text" id="p-name" required>
                </div>
                <div class="form-group">
                    <label>Rasm Linki (URL)</label>
                    <input type="url" id="p-img" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label>Narxi ($ yoki So'm)</label>
                    <input type="text" id="p-price" required>
                </div>
                <div class="form-group">
                    <label>Soni (Omborda)</label>
                    <input type="number" id="p-stock" required>
                </div>
                <div class="form-group">
                    <label>Oylik Sotuv Soni (Statistika uchun)</label>
                    <input type="number" id="p-sales" value="0">
                </div>
                <button type="submit" class="submit-btn">Saqlash</button>
            </form>
        </div>
    </div>

    <script>
        // TELEGRAM BOT CONFIG (Tokeningizni shu yerga qo'yasiz)
        const BOT_TOKEN = "BOT_TOKENINGIZNI_SHU_YERGA_YOZING";
        const CHAT_ID = "TELEGRAM_ID_INGIZ";

        // Animatsiyani o'chirib asosiy sahifani ochish
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const overlay = document.getElementById('welcome-overlay');
                overlay.style.opacity = '0';
                overlay.style.visibility = 'hidden';
            }, 2500); // 2.5 soniya ko'rinib turadi

            renderProducts();
        });

        // 1. Ma'lumotlarni eslab qolish (LocalStorage yuklash yoki default yaratish)
        let products = JSON.parse(localStorage.getItem('imarket_products')) || [
            { id: 1, name: "Premium iPhone Case", img: "https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=500", price: "150,000 so'm", stock: 3, sales: 12 },
            { id: 2, name: "Wireless Earbuds v2", img: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df?w=500", price: "320,000 so'm", stock: 0, sales: 0 },
            { id: 3, name: "Smart Watch Skromniy", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500", price: "450,000 so'm", stock: 15, sales: 1 }
        ];

        function saveToStorage() {
            localStorage.setItem('imarket_products', JSON.stringify(products));
            renderProducts();
        }

        // Modal ochib yopish
        function toggleModal(show) {
            const modal = document.getElementById('product-modal');
            if(show) modal.classList.add('active');
            else modal.classList.remove('active');
        }

        // Yangi mahsulot qo'shish va eslab qolish
        function saveProduct(e) {
            e.preventDefault();
            const newProd = {
                id: Date.now(),
                name: document.getElementById('p-name').value,
                img: document.getElementById('p-img').value,
                price: document.getElementById('p-price').value,
                stock: parseInt(document.getElementById('p-stock').value),
                sales: parseInt(document.getElementById('p-sales').value) || 0
            };

            products.push(newProd);
            saveToStorage();
            toggleModal(false);
            document.getElementById('product-form').reset();
            
            // Telegramga bildirishnoma yuborish (ixtiyoriy)
            sendTelegramNotification(`Yangi mahsulot qo'shildi: ${newProd.name}`);
        }

        // O'chirish o'rniga Soni=0 bo'lsa "Sotuvda yo'q" yozish mantig'i bilan render qilish
        function renderProducts() {
            const container = document.getElementById('products-container');
            const alertsZone = document.getElementById('alerts-zone');
            container.innerHTML = '';
            alertsZone.innerHTML = '';

            let alertCount = 0;

            products.forEach(p => {
                // Kam qolgan tovar ogohlantiruvi (agar 1 tadan 5 tagacha bo'lsa)
                if (p.stock > 0 && p.stock <= 4) {
                    alertsZone.innerHTML += `<div class="alert-item alert-warning"><i class="fa-solid fa-triangle-exclamation"></i> <b>${p.name}</b> zaxirasi kam qoldi! (Atigi ${p.stock} ta)</div>`;
                }
                
                // Sotilmayotgan tovar ogohlantiruvi (Agar omborda bor bo'lsa-yu lekin sotuv 0 bo'lsa)
                if (p.sales === 0 && p.stock > 0) {
                    alertsZone.innerHTML += `<div class="alert-item alert-danger"><i class="fa-solid fa-chart-line-down"></i> Diqqat! <b>${p.name}</b> mahsuloti umuman sotilmayapti!</div>`;
                }

                const isOut = p.stock === 0;

                const cardHtml = `
                    <div class="product-card">
                        <div class="image-container">
                            <img src="${p.img}" alt="${p.name}" onerror="this.src='https://placehold.co/300?text=Rasm+Yoq'">
                            <div class="image-overlay-panel">
                                <div class="stock-count">📦 Soni: ${p.stock} ta</div>
                                <div class="product-price">${p.price}</div>
                            </div>
                        </div>
                        <div class="product-info">
                            <div class="product-title">${p.name}</div>
                            <div>
                                ${isOut ? 
                                    `<span class="status-badge status-out"><i class="fa-solid fa-ban"></i> Sotuvda yo'q</span>` : 
                                    `<span class="status-badge status-active"><i class="fa-solid fa-check"></i> Sotuvda mavjud</span>`
                                }
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // Qidiruv funksiyasi
        function filterProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const cards = document.getElementsByClassName('product-card');
            
            products.forEach((p, index) => {
                if(p.name.toLowerCase().includes(query)) {
                    cards[index].style.display = "flex";
                } else {
                    cards[index].style.display = "none";
                }
            });
        }

        // Telegram Bot integration funksiyasi
        function sendTelegramNotification(text) {
            if(BOT_TOKEN === "8030936164:AAEq6sKOO2OXQXTLxUUPl6PJGcEu3VDQLwk") return;
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`;
            fetch(url).catch(err => console.error("Telegram xatolik:", err));
        }
    </script>
</body>
</html>
