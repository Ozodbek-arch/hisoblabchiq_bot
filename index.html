
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>iMarket - Omborxona</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
:root {
  --sidebar:#0d0d0d;
  --sidebar-hover:#1a1a1a;
  --sidebar-text:#a0a0a0;
  --sidebar-active:#ffffff;
  --bg:#f5f6f8;
  --card:#ffffff;
  --text:#1a1a1a;
  --text-2:#6b7280;
  --border:#e5e7eb;
  --primary:#111827;
  --primary-hover:#000000;
  --success:#10b981;
  --warning:#f59e0b;
  --danger:#ef4444;
  --info:#3b82f6;
}
body { background:var(--bg); color:var(--text); min-height:100vh; }
.app { display:flex; min-height:100vh; }

/* SIDEBAR */
.sidebar {
  width:260px; background:var(--sidebar); color:#fff;
  padding:24px 16px; position:fixed; height:100vh; overflow-y:auto;
  z-index:100; transition:transform .3s;
}
.sidebar-logo { font-size:28px; font-weight:800; margin-bottom:32px; padding:0 12px; letter-spacing:-1px; }
.sidebar-logo span { color:#6b7280; font-weight:400; font-size:14px; display:block; margin-top:4px; letter-spacing:0; }
.nav-item {
  display:flex; align-items:center; gap:12px; padding:12px;
  border-radius:10px; color:var(--sidebar-text); cursor:pointer;
  margin-bottom:4px; font-size:14px; font-weight:500; transition:all .2s;
}
.nav-item:hover { background:var(--sidebar-hover); color:#fff; }
.nav-item.active { background:var(--sidebar-hover); color:#fff; }
.nav-item svg { width:20px; height:20px; flex-shrink:0; }
.nav-section { font-size:11px; color:#555; padding:16px 12px 8px; text-transform:uppercase; letter-spacing:1px; }

/* MAIN */
.main { flex:1; margin-left:260px; padding:24px 32px; }
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.page-title { font-size:26px; font-weight:700; }
.page-actions { display:flex; gap:10px; flex-wrap:wrap; }

/* BUTTONS */
.btn {
  padding:10px 18px; border:none; border-radius:10px; cursor:pointer;
  font-size:14px; font-weight:600; display:inline-flex; align-items:center; gap:8px;
  transition:all .2s;
}
.btn-primary { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-hover); }
.btn-secondary { background:#fff; color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { background:#f9fafb; }
.btn-success { background:var(--success); color:#fff; }
.btn-danger { background:var(--danger); color:#fff; }
.btn-icon { padding:8px; }

/* CARDS */
.card { background:var(--card); border-radius:14px; padding:20px; border:1px solid var(--border); }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:var(--card); border-radius:14px; padding:20px; border:1px solid var(--border); }
.stat-label { font-size:13px; color:var(--text-2); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
.stat-value { font-size:28px; font-weight:700; margin-bottom:4px; }
.stat-change { font-size:12px; color:var(--success); }
.stat-change.down { color:var(--danger); }

/* TABLE */
.table-wrap { background:var(--card); border-radius:14px; border:1px solid var(--border); overflow:hidden; }
.table-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
.search-input {
  flex:1; min-width:200px; padding:9px 14px; border:1px solid var(--border);
  border-radius:8px; font-size:14px; outline:none;
}
.search-input:focus { border-color:var(--primary); }
.filter-select { padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; background:#fff; outline:none; }
table { width:100%; border-collapse:collapse; }
th, td { padding:14px 20px; text-align:left; font-size:14px; border-bottom:1px solid var(--border); }
th { background:#fafafa; font-weight:600; color:var(--text-2); font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#fafafa; }
.badge { padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; display:inline-block; }
.badge-success { background:#d1fae5; color:#065f46; }
.badge-warning { background:#fef3c7; color:#92400e; }
.badge-danger { background:#fee2e2; color:#991b1b; }
.badge-info { background:#dbeafe; color:#1e40af; }
.actions-cell { display:flex; gap:6px; }
.action-btn { width:32px; height:32px; border:none; background:#f3f4f6; border-radius:8px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.action-btn:hover { background:#e5e7eb; }
.action-btn.delete:hover { background:#fee2e2; color:var(--danger); }

/* PAGINATION */
.pagination { padding:16px 20px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--border); font-size:13px; color:var(--text-2); }
.page-btns { display:flex; gap:4px; }
.page-btn { padding:6px 12px; border:1px solid var(--border); background:#fff; border-radius:6px; cursor:pointer; font-size:13px; }
.page-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }

/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-overlay.show { display:flex; }
.modal { background:#fff; border-radius:16px; padding:28px; max-width:600px; width:100%; max-height:90vh; overflow-y:auto; }
.modal-title { font-size:20px; font-weight:700; margin-bottom:20px; }
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:13px; font-weight:600; margin-bottom:6px; color:var(--text-2); }
.form-input, .form-select, .form-textarea {
  width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:10px;
  font-size:14px; outline:none; font-family:inherit;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--primary); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }

/* CHART */
.charts-grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:24px; }
.chart-card { background:var(--card); border-radius:14px; padding:20px; border:1px solid var(--border); }
.chart-title { font-size:16px; font-weight:700; margin-bottom:16px; }

/* TABS */
.tabs { display:flex; gap:4px; margin-bottom:16px; background:#f3f4f6; padding:4px; border-radius:10px; width:fit-content; }
.tab { padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-2); }
.tab.active { background:#fff; color:var(--text); box-shadow:0 1px 2px rgba(0,0,0,.05); }

/* WAREHOUSE LIST */
.warehouse-list { display:grid; gap:12px; }
.warehouse-item { background:var(--card); border-radius:14px; padding:20px; border:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
.warehouse-info h3 { font-size:16px; margin-bottom:4px; }
.warehouse-info p { font-size:13px; color:var(--text-2); }
.warehouse-stats { display:flex; gap:20px; }
.warehouse-stat { text-align:right; }
.warehouse-stat .label { font-size:12px; color:var(--text-2); }
.warehouse-stat .value { font-size:15px; font-weight:700; }

/* REPORT */
.report-summary { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
.report-item { background:var(--card); border-radius:12px; padding:16px; border:1px solid var(--border); }
.report-item .label { font-size:12px; color:var(--text-2); margin-bottom:4px; }
.report-item .value { font-size:22px; font-weight:700; }

/* MOBILE */
.menu-toggle { display:none; position:fixed; top:16px; left:16px; z-index:200; background:var(--primary); color:#fff; border:none; width:44px; height:44px; border-radius:10px; cursor:pointer; }
@media (max-width:900px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .main { margin-left:0; padding:16px; padding-top:70px; }
  .menu-toggle { display:flex; align-items:center; justify-content:center; }
  .charts-grid { grid-template-columns:1fr; }
  .form-row { grid-template-columns:1fr; }
  table { font-size:12px; }
  th, td { padding:10px 12px; }
}

/* TOAST */
.toast { position:fixed; bottom:20px; right:20px; background:var(--primary); color:#fff; padding:14px 20px; border-radius:10px; z-index:2000; transform:translateY(100px); opacity:0; transition:all .3s; font-weight:500; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.success { background:var(--success); }
.toast.error { background:var(--danger); }

.empty { text-align:center; padding:40px 20px; color:var(--text-2); }
.empty svg { width:48px; height:48px; margin-bottom:12px; opacity:.3; }
</style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
</button>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">iMarket<span>OMBORXONA WEB APP</span></div>
    <nav>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Asosiy panel
      </div>
      <div class="nav-item" data-page="products" onclick="navigate('products')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7L12 3L4 7M20 7v10l-8 4M20 7l-8 4M4 7l8 4M4 7v10l8 4M12 11v10"/></svg>
        Mahsulotlar
      </div>
      <div class="nav-item" data-page="income" onclick="navigate('income')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
        Kirim
      </div>
      <div class="nav-item" data-page="expense" onclick="navigate('expense')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        Chiqim
      </div>
      <div class="nav-item" data-page="warehouses" onclick="navigate('warehouses')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Omborlar
      </div>
      <div class="nav-item" data-page="reports" onclick="navigate('reports')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        Hisobotlar
      </div>
      <div class="nav-section">Boshqaruv</div>
      <div class="nav-item" data-page="categories" onclick="navigate('categories')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"/></svg>
        Kategoriyalar
      </div>
      <div class="nav-item" data-page="users" onclick="navigate('users')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        Foydalanuvchilar
      </div>
      <div class="nav-item" data-page="settings" onclick="navigate('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Sozlamalar
      </div>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainContent"></main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============ TELEGRAM WEB APP ============
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// ============ DATA STORE ============
const DB = {
  get(key, def=[]) { try { return JSON.parse(localStorage.getItem('imarket_'+key)) || def; } catch { return def; } },
  set(key, val) { localStorage.setItem('imarket_'+key, JSON.stringify(val)); }
};

// Initialize demo data
function initDemoData() {
  if (!localStorage.getItem('imarket_initialized')) {
    DB.set('categories', [
      {id:1,name:'G\'Iloflar',icon:''},
      {id:2,name:'Zaryadlovchilar',icon:'🔌'},
      {id:3,name:'Quloqchinlar',icon:'🎧'},
      {id:4,name:'Power Bank',icon:'🔋'},
      {id:5,name:'Aksessuarlar',icon:'⌚'}
    ]);
    DB.set('warehouses', [
      {id:1,name:'Asosiy ombor',manager:'Toshkent, Chilanzar',type:'Omborxon'},
      {id:2,name:'Zaxira ombor',manager:'Toshkent, Sergeli',type:'Asosiy'},
      {id:3,name:'Do\'kon ombori',manager:'Toshkent, Yunusobod',type:'Jisur'}
    ]);
    DB.set('products', [
      {id:1,name:'iPhone 15 Case',sku:'IM-C15-BK',categoryId:1,warehouseId:1,qty:45,price:150000,status:'active'},
      {id:2,name:'AirPods Pro 2 Case',sku:'AP2-CASE-W',categoryId:1,warehouseId:1,qty:28,price:120000,status:'active'},
      {id:3,name:'Baseus 20W Charger',sku:'BSS-20W-EU',categoryId:2,warehouseId:1,qty:60,price:180000,status:'active'},
      {id:4,name:'USB-C to Lightning Cable',sku:'USBC-LGHT-1M',categoryId:3,warehouseId:1,qty:100,price:80000,status:'active'},
      {id:5,name:'Wireless Earbuds X1',sku:'WE-X1-BK',categoryId:4,warehouseId:1,qty:15,price:250000,status:'low'},
      {id:6,name:'Power Bank 10000mAh',sku:'PB-10K-BK',categoryId:5,warehouseId:1,qty:12,price:220000,status:'low'}
    ]);
    DB.set('income', [
      {id:1,partner:'Asssiy Mobile',date:'2025-11-07',warehouseId:1,items:[{productId:3,qty:30,price:180000},{productId:4,qty:50,price:80000}],total:9400000},
      {id:2,partner:'Techno Trade',date:'2025-10-25',warehouseId:1,items:[{productId:1,qty:20,price:140000}],total:2800000}
    ]);
    DB.set('expense', [
      {id:1,type:'Sotuv',partner:'Sotuv #1245',date:'2025-11-07',warehouseId:1,items:[{productId:1,qty:2,price:160000},{productId:2,qty:1,price:120000}],total:440000},
      {id:2,type:'Sotuv',partner:'Sotuv #1244',date:'2025-11-06',warehouseId:1,items:[{productId:3,qty:2,price:180000}],total:360000}
    ]);
    DB.set('users', [
      {id:1,name:'Admin',role:'admin',phone:'+998901234567'},
      {id:2,name:'Sotuvchi',role:'seller',phone:'+998907654321'}
    ]);
    localStorage.setItem('imarket_initialized','1');
  }
}
initDemoData();

// ============ NAVIGATION ============
let currentPage = 'dashboard';
let charts = {};

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  renderPage();
  if (window.innerWidth <= 900) document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ============ RENDER PAGES ============
function renderPage() {
  const main = document.getElementById('mainContent');
  Object.values(charts).forEach(c => c?.destroy?.());
  charts = {};
  
  const pages = {
    dashboard: renderDashboard,
    products: renderProducts,
    income: renderIncome,
    expense: renderExpense,
    warehouses: renderWarehouses,
    categories: renderCategories,
    users: renderUsers,
    reports: renderReports,
    settings: renderSettings
  };
  (pages[currentPage] || renderDashboard)(main);
}

// ============ DASHBOARD ============
function renderDashboard(main) {
  const products = DB.get('products');
  const income = DB.get('income');
  const expense = DB.get('expense');
  const warehouses = DB.get('warehouses');
  const categories = DB.get('categories');
  
  const totalProducts = products.length;
  const totalStock = products.reduce((s,p) => s + p.qty, 0);
  const totalValue = products.reduce((s,p) => s + p.qty * p.price, 0);
  const totalIncome = income.reduce((s,i) => s + i.total, 0);
  const totalExpense = expense.reduce((s,e) => s + e.total, 0);
  const profit = totalIncome - totalExpense;
  
  main.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Asosiy panel</div>
        <div style="color:var(--text-2);font-size:14px;margin-top:4px;">Xush kelibsiz, ${tg.initDataUnsafe?.user?.first_name || 'Admin'}!</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-secondary" onclick="exportData()">📤 Export</button>
        <button class="btn btn-primary" onclick="openProductModal()">+ Yangi mahsulot</button>
      </div>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">📦 Jami mahsulotlar</div>
        <div class="stat-value">${totalProducts.toLocaleString()}</div>
        <div class="stat-change">+${products.filter(p=>p.status==='active').length} faol</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"> Jami ombor qiymati</div>
        <div class="stat-value">${formatMoney(totalValue)}</div>
        <div class="stat-change">so'm</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📥 Kirim (oylik)</div>
        <div class="stat-value">${formatMoney(totalIncome)}</div>
        <div class="stat-change">+${income.length} tranzaksiya</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">📤 Chiqim (oylik)</div>
        <div class="stat-value">${formatMoney(totalExpense)}</div>
        <div class="stat-change down">${expense.length} tranzaksiya</div>
      </div>
      <div class="stat-card">
        <div class="stat-label"> Foyda</div>
        <div class="stat-value" style="color:${profit>=0?'var(--success)':'var(--danger)'}">${formatMoney(profit)}</div>
        <div class="stat-change">${profit>=0?'↑':'↓'} so'm</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">🏭 Omborlar</div>
        <div class="stat-value">${warehouses.length}</div>
        <div class="stat-change">${categories.length} kategoriya</div>
      </div>
    </div>
    
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Ombor harakati (7 kun)</div>
        <canvas id="chartMovement" height="100"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">Kategoriya bo'yicha</div>
        <canvas id="chartCategory" height="200"></canvas>
      </div>
    </div>
    
    <div class="charts-grid">
      <div class="table-wrap" style="grid-column:1/-1">
        <div class="table-header">
          <strong>So'nggi harakatlar</strong>
        </div>
        <table>
          <thead><tr><th>Sana</th><th>Turi</th><th>Hamkor</th><th>Miqdor</th><th>Summa</th></tr></thead>
          <tbody>
            ${[...income.map(i=>({...i,type:'Kirim',typeColor:'success'})),...expense.map(e=>({...e,type:'Chiqim',typeColor:'danger'}))]
              .sort((a,b)=>new Date(b.date)-new Date(a.date))
              .slice(0,5)
              .map(t=>`<tr>
                <td>${t.date}</td>
                <td><span class="badge badge-${t.typeColor}">${t.type}</span></td>
                <td>${t.partner}</td>
                <td>${t.items.reduce((s,i)=>s+i.qty,0)} dona</td>
                <td><strong>${formatMoney(t.total)}</strong></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
  
  // Movement chart
  const ctx1 = document.getElementById('chartMovement').getContext('2d');
  charts.movement = new Chart(ctx1, {
    type:'line',
    data:{
      labels:['Du','Se','Ch','Pa','Ju','Sh','Ya'],
      datasets:[

           (productFilters.warehouse==='all' || p.warehouseId==productFilters.warehouse) &&
           (productFilters.status==='all' || p.status===productFilters.status);

  const totalPages = Math.ceil(filtered.length / perPage);
  const pageData = filtered.slice((productPage-1)*perPage, productPage*perPage);
  
  main.innerHTML = `
    <div class="page-header">

          ${categories.map(c=>`<option value="${c.id}" ${productFilters.category==c.id?'selected':''}>${c.icon} ${c.name}</option>`).join('')}

        <select class="filter-select" onchange="productFilters.warehouse=this.value;productPage=1;renderProducts(document.getElementById('mainContent'))">
          <option value="all">Ombor: Barchasi</option>
          ${warehouses.map(w=>`<option value="${w.id}" ${productFilters.warehouse==w.id?'selected':''}>${w.name}</option>`).join('')}
        </select>
        <select class="filter-select" onchange="productFilters.status=this.value;productPage=1;renderProducts(document.getElementById('mainContent'))">
          <option value="all">Holat: Barchasi</option>
          <option value="active" ${productFilters.status==='active'?'selected':''}>Aktiv</option>
          <option value="low" ${productFilters.status==='low'?'selected':''}>Kam qolgan</option>
          <option value="out" ${productFilters.status==='out'?'selected':''}>Tugagan</option>
        </select>
      </div>
      <table>
        <thead><tr><th>#</th><th>Mahsulot nomi</th><th>SKU</th><th>Kategoriya</th><th>Ombor</th><th>Miqdor</th><th>Sotuv narxi</th><th>Holat</th><th>Amallar</th></tr></thead>
        <tbody>
          ${pageData.length ? pageData.map((p,i)=>{
            const cat = categories.find(c=>c.id===p.categoryId);
            const wh = warehouses.find(w=>w.id===p.warehouseId);
            const status = p.qty===0?'out':p.qty<20?'low':'active';
            const statusLabel = status==='active'?'Aktiv':status==='low'?'Kam qolgan':'Tugagan';
            const statusClass = status==='active'?'success':status==='low'?'warning':'danger';
            return `<tr>
              <td>${(productPage-1)*perPage+i+1}</td>
              <td><strong>${p.name}</strong></td>
              <td>${p.sku}</td>
              <td>${cat?cat.icon+' '+cat.name:'-'}</td>
              <td>${wh?wh.name:'-'}</td>

function saveProduct(id) {
  const products = DB.get('products');
  const data = {
    name: document.getElementById('pName').value.trim(),
    sku: document.getElementById('pSku').value.trim(),
    qty: parseInt(document.getElementById('pQty').value)||0,
    categoryId: parseInt(document.getElementById('pCat').value),
    warehouseId: parseInt(document.getElementById('pWh').value),
    price: parseInt(document.getElementById('pPrice').value)||0,
    status: 'active'
  };
  if (!data.name || !data.sku) { toast('Nom va SKU majburiy','error'); return; }
  
  if (id) {
    const idx = products.findIndex(p=>p.id===id);
    products[idx] = {...products[idx], ...data};
    toast('Mahsulot yangilandi','success');
  } else {
    data.id = Date.now();
    products.push(data);
    toast('Mahsulot qo\'shildi','success');
  }
  DB.set('products', products);
  closeModal();
  renderProducts(document.getElementById('mainContent'));
}

function deleteProduct(id) {
  if (!confirm('Mahsulotni o\'chirishni xohlaysizmi?')) return;
  DB.set('products', DB.get('products').filter(p=>p.id!==id));
  toast('Mahsulot o\'chirildi','success');
  renderProducts(document.getElementById('mainContent'));
}

function saveIncome() {
  const partner = document.getElementById('iPartner').value.trim();
  const date = document.getElementById('iDate').value;
  const warehouseId = parseInt(document.getElementById('iWh').value);
  if (!partner || !date) { toast('Ma\'lumotlarni to\'ldiring','error'); return; }
  
  const items = [];
  let total = 0;
  document.querySelectorAll('.income-item').forEach(row => {
    const productId = parseInt(row.querySelector('.iProduct').value);
    const qty = parseInt(row.querySelector('.iQty').value)||0;
    const products = DB.get('products');
    const p = products.find(x=>x.id===productId);
    if (p && qty > 0) {
      items.push({productId, qty, price: p.price});
      total += qty * p.price;
      p.qty += qty;
    }
  });
  
  if (!items.length) { toast('Kamida bitta mahsulot qo\'shing','error'); return; }
  
  const income = DB.get('income');
  income.push({id:Date.now(), partner, date, warehouseId, items, total});
  DB.set('income', income);
  DB.set('products', DB.get('products'));
  
  toast('Kirim qo\'shildi','success');
  closeModal();
  renderIncome(document.getElementById('mainContent'));
}

function deleteIncome(id) {
  if (!confirm('Kirimni o\'chirishni xohlaysizmi?')) return;
  const income = DB.get('income');
  const record = income.find(i=>i.id===id);
  if (record) {
    const products = DB.get('products');
    record.items.forEach(it => {
      const p = products.find(x=>x.id===it.productId);
      if (p) p.qty = Math.max(0, p.qty - it.qty);
    });
    DB.set('products', products);
  }
  DB.set('income', income.filter(i=>i.id!==id));
  toast('Kirim o\'chirildi','success');
  renderIncome(document.getElementById('mainContent'));
}

function saveExpense() {

  const warehouseId = parseInt(document.getElementById('eWh').value);
  if (!partner || !date) { toast('Ma\'lumotlarni to\'ldiring','error'); return; }
  
  const items = [];
  let total = 0;
  const products = DB.get('products');
  document.querySelectorAll('.expense-item').forEach(row => {
    const productId = parseInt(row.querySelector('.eProduct').value);
    const qty = parseInt(row.querySelector('.eQty').value)||0;
    const p = products.find(x=>x.id===productId);
    if (p && qty > 0) {
      if (p.qty < qty) { toast(`${p.name} yetarli emas`,'error'); throw new Error(); }
      items.push({productId, qty, price: p.price});

      p.qty -= qty;

  if (!items.length) { toast('Kamida bitta mahsulot qo\'shing','error'); return; }
