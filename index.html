<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMarket Premium Admin Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0b0b0c;
            --bg-card: #121214;
            --bg-input: #1a1a1e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.06);
            
            --danger: #ff453a;
            --warning: #ff9f0a;
            --success: #30d158;
            
            --font-title: 'Space Grotesk', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: var(--font-body); -webkit-font-smoothing: antialiased;
        }

        body { background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; }

        header {
            background: rgba(11, 11, 12, 0.8); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px); padding: 20px;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }

        .header-wrap { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* YANGI: Logotip va Premium Soat/Kalendar Paneli */
        .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        
        .brand-zone { display: flex; flex-direction: column; }
        .brand-logo { font-family: var(--font-title); font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
        
        /* Premium Soat va Kalendar vidjeti */
        .live-ticker {
            display: flex; align-items: center; gap: 15px; background: var(--bg-card);
            border: 1px solid var(--border); padding: 8px 16px; border-radius: 12px;
        }
        .ticker-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 500; color: #fff; }
        .ticker-item i { color: var(--text-muted); font-size: 0.9rem; }
        #live-clock { font-family: var(--font-title); font-weight: 600; letter-spacing: 0.5px; }

        /* Qidiruv va Saralash Paneli */
        .controls-row { display: flex; gap: 12px; align-items: center; width: 100%; }
        .search-container { position: relative; flex-grow: 1; }
        .search-container input {
            width: 100%; padding: 12px 18px 12px 45px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; transition: var(--transition);
        }
        .search-container input:focus { border-color: rgba(255,255,255,0.2); }
        .search-container i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .sort-select {
            padding: 12px 15px; background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 12px; color: #fff; outline: none; cursor: pointer; font-size: 0.9rem;
        }

        /* Asosiy va Ichki Kataloglar */
        .catalog-nav, .sub-catalog-nav {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none;
        }
        .catalog-nav::-webkit-scrollbar, .sub-catalog-nav::-webkit-scrollbar { display: none; }

        .nav-item {
            display: flex; align-items: center; gap: 8px; padding: 10px 18px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
            font-size: 0.85rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: var(--transition); color: var(--text-muted);
        }
        .nav-item.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

        .sub-catalog-nav { margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.03); padding-top: 10px; display: none; }
        .sub-item {
            padding: 6px 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 20px; font-size: 0.8rem; cursor: pointer; color: var(--text-muted); transition: var(--transition);
        }
        .sub-item.active { background: #fff; color: #000; border-color: #fff; }

        /* Mahsulotlar Grid */
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }

        .product-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px;
            overflow: hidden; display: flex; flex-direction: column; transition: var(--transition); position: relative;
        }
        .product-card:hover { transform: translateY(-4px); border-color: rgba(255, 255, 255, 0.15); }

        /* Mahsulotni o'chirish tugmasi */
        .delete-btn {
            position: absolute; top: 12px; right: 12px; width: 32px; height: 32px;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            color: #fff; cursor: pointer; z-index: 5; transition: var(--transition);
        }
        .delete-btn:hover { background: var(--danger); border-color: var(--danger); transform: scale(1.1); }

        .img-box { position: relative; width: 100%; padding-top: 100%; background: #16161a; }
        .img-box img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .img-meta-panel {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(to top, rgba(18,18,20,0.95), rgba(18,18,20,0));
            padding: 15px; display: flex; justify-content: space-between; align-items: flex-end;
        }
        .meta-stock { font-size: 0.75rem; color: var(--text-muted); background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px; }
        .meta-price { font-family: var(--font-title); font-weight: 600; font-size: 1.05rem; }

        .info-box { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; gap: 10px; }
        .product-name { font-size: 1rem; font-weight: 500; line-height: 1.4; }
        .meta-bottom { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .sub-tag { font-size: 0.75rem; color: var(--text-muted); background: rgba(255,255,255,0.03); padding: 2px 6px; border-radius: 4px; }
        .date-tag { font-size: 0.7rem; color: var(--text-muted); }

        /* Floating Button va Modal */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            background: #fff; color: #000; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 1.3rem; cursor: pointer; z-index: 99;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex;
            justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: var(--transition);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-body {
            background: var(--bg-card); border: 1px solid var(--border); padding: 25px;
            border-radius: 24px; width: 90%; max-width: 460px; max-height: 90vh; overflow-y: auto;
        }

        .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .close-btn { cursor: pointer; color: var(--text-muted); }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; color: #fff; outline: none;
        }

        .image-upload-zone {
            border: 2px dashed var(--border); padding: 20px; border-radius: 12px; text-align: center; background: var(--bg-input); cursor: pointer;
        }
        .image-upload-zone i { font-size: 1.8rem; color: var(--text-muted); margin-bottom: 5px; }
        .image-upload-zone p { font-size: 0.8rem; color: var(--text-muted); }
        .image-upload-zone input { display: none; }
        .preview-img-container { margin-top: 10px; display: none; width: 100%; height: 140px; border-radius: 8px; overflow: hidden; background: #000; }
        .preview-img-container img { width: 100%; height: 100%; object-fit: contain; }

        .btn-submit { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="header-wrap">
            <div class="header-top">
                <div class="brand-zone">
                    <div class="brand-logo">iMarket.</div>
                </div>
                
                <div class="live-ticker">
                    <div class="ticker-item"><i class="fa-regular fa-calendar"></i> <span id="live-date">--.--.----</span></div>
                    <div class="ticker-item"><i class="fa-regular fa-clock"></i> <span id="live-clock">00:00:00</span></div>
                </div>
            </div>

            <div class="controls-row">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Mahsulot qidirish..." oninput="filterAndRender()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <select class="sort-select" id="price-sort" onchange="filterAndRender()">
                    <option value="default">Saralash</option>
                    <option value="low-high">Arzonidan qimmatiga</option>
                    <option value="high-low">Qimmatidan arzoniga</option>
                </select>
            </div>
            
            <div class="catalog-nav">
                <div class="nav-item active" onclick="switchCategory('all', this)"><i class="fa-solid fa-border-all"></i> Barchasi</div>
                <div class="nav-item" onclick="switchCategory('chexol', this)"><i class="fa-solid fa-mobile-screen-button"></i> Chexol</div>
                <div class="nav-item" onclick="switchCategory('stiklo', this)"><i class="fa-solid fa-shield-halved"></i> Stiklo</div>
                <div class="nav-item" onclick="switchCategory('hid', this)"><i class="fa-solid fa-spray-can"></i> Hid chiqazuvchi</div>
                <div class="nav-item" onclick="switchCategory('soat', this)"><i class="fa-solid fa-clock"></i> Soat</div>
                <div class="nav-item" onclick="switchCategory('naushnik', this)"><i class="fa-solid fa-headphones"></i> Naushnik</div>
                <div class="nav-item" onclick="switchCategory('barsetka', this)"><i class="fa-solid fa-bag-shopping"></i> Barsetka</div>
                <div class="nav-item" onclick="switchCategory('oyinchoq', this)"><i class="fa-solid fa-gamepad"></i> O'yinchoq</div>
                <div class="nav-item" onclick="switchCategory('planshet', this)"><i class="fa-solid fa-tablet-screen-button"></i> Planshet</div>
                <div class="nav-item" onclick="switchCategory('zaryadnik', this)"><i class="fa-solid fa-plug"></i> Zaryadnik</div>
                <div class="nav-item" onclick="switchCategory('typec', this)"><i class="fa-solid fa-bolt"></i> Kabel Type-C</div>
                <div class="nav-item" onclick="switchCategory('lightning', this)"><i class="fa-solid fa-bolt-lightning"></i> Kabel Lightning</div>
                <div class="nav-item" onclick="switchCategory('mishka', this)"><i class="fa-solid fa-computer-mouse"></i> Mishka</div>
                <div class="nav-item" onclick="switchCategory('klaviatura', this)"><i class="fa-solid fa-keyboard"></i> Klaviatura</div>
                <div class="nav-item" onclick="switchCategory('powerbank', this)"><i class="fa-solid fa-battery-three-quarters"></i> Powerbank</div>
                <div class="nav-item" onclick="switchCategory('shtativ', this)"><i class="fa-solid fa-mobile-retro"></i> Shtativ</div>
                <div class="nav-item" onclick="switchCategory('fen', this)"><i class="fa-solid fa-wind"></i> Fen va Taroq</div>
                <div class="nav-item" onclick="switchCategory('zashita', this)"><i class="fa-solid fa-camera-retro"></i> Kamera Zashita</div>
            </div>

            <div class="sub-catalog-nav" id="sub-catalog-box"></div>
        </div>
    </header>

    <main class="container">
        <div class="products-grid" id="products-container"></div>
    </main>

    <div class="fab" onclick="toggleModal(true)"><i class="fa-solid fa-plus"></i></div>

    <div class="modal-overlay" id="product-modal">
        <div class="modal-body">
            <div class="modal-head">
                <h3>Yangi Mahsulot</h3>
                <i class="fa-solid fa-xmark close-btn" onclick="toggleModal(false)"></i>
            </div>
            <form id="product-form" onsubmit="saveProduct(event)">
                <div class="form-group">
                    <label>Asosiy Kategoriya</label>
                    <select id="p-category" onchange="handleModalCategoryChange()" required>
                        <option value="chexol">Chexol</option>
                        <option value="stiklo">Stiklo</option>
                        <option value="hid">Hid chiqazuvchi</option>
                        <option value="soat">Soat</option>
                        <option value="naushnik">Naushnik</option>
                        <option value="barsetka">Barsetka</option>
                        <option value="oyinchoq">O'yinchoq</option>
                        <option value="planshet">Planshet</option>
                        <option value="zaryadnik">Zaryadnik</option>
                        <option value="typec">Kabel Type-C</option>
                        <option value="lightning">Kabel Lightning</option>
                        <option value="mishka">Mishka</option>
                        <option value="klaviatura">Klaviatura</option>
                        <option value="powerbank">Powerbank</option>
                        <option value="shtativ">Shtativ</option>
                        <option value="fen">Fen va Taroq</option>
                        <option value="zashita">Kamera Zashita</option>
                    </select>
                </div>

                <div class="form-group" id="modal-sub-group">
                    <label>Ichki Model / Turi</label>
                    <select id="p-sub-category"></select>
                </div>

                <div class="form-group">
                    <label>Mahsulot Nomi</label>
                    <input type="text" id="p-name" required>
                </div>
                
                <div class="form-group">
                    <label>Mahsulot Rasmi (Galereya / Kamera)</label>
                    <div class="image-upload-zone" onclick="document.getElementById('p-file').click()">
                        <i class="fa-solid fa-images"></i>
                        <p>Tanlash uchun bosing</p>
                        <input type="file" id="p-file" accept="image/*" onchange="previewImage(this)" required>
                    </div>
                    <div class="preview-img-container" id="preview-container">
                        <img id="img-preview-src" src="" alt="Preview">
                    </div>
                </div>

                <div class="form-group">
                    <label>Narxi (Faqat raqamda, masalan: 125000)</label>
                    <input type="number" id="p-price" placeholder="Masalan: 125000" required>
                </div>
                <div class="form-group">
                    <label>Soni (Omborda)</label>
                    <input type="number" id="p-stock" min="0" required>
                </div>

                <button type="submit" class="btn-submit">Omborga Qo'shish</button>
            </form>
        </div>
    </div>

    <script>
        let currentCategory = 'all';
        let currentSubCategory = 'all';
        let encodedImageBase64 = "";

        const subCategoriesMap = {
            chexol: ['Umumiy', '11', '11 Pro', '11 Pro Max', '12', '12 Pro', '12 Pro Max', '13', '13 Pro', '13 Pro Max', '14', '14 Pro', '14 Pro Max', '15', '15 Pro', '15 Pro Max'],
            stiklo: ['Umumiy', 'Oddiy Stiklo', 'Premium 9D', 'Matoviy', 'Antishpion'],
            naushnik: ['Umumiy', 'AirPods', 'Simli', 'Bluetooth Katta'],
            soat: ['Umumiy', 'Apple Watch', 'Smart Band', 'Klassik']
        };

        // KAFOLATLANGAN LOCALSTORAGE TIZIMI (HECH QACHON O'CHMAYDI)
        let products = JSON.parse(localStorage.getItem('imarket_premium_products')) || [];

        window.addEventListener('DOMContentLoaded', () => {
            handleModalCategoryChange();
            filterAndRender();
            startLiveClock();
        });

        // JONLI SOAT VA KALENDAR FUNKSIYASI
        function startLiveClock() {
            setInterval(() => {
                const now = new Date();
                
                // Soatni yangilash
                const hrs = String(now.getHours()).padStart(2, '0');
                const mins = String(now.getMinutes()).padStart(2, '0');
                const secs = String(now.getSeconds()).padStart(2, '0');
                document.getElementById('live-clock').innerText = `${hrs}:${mins}:${secs}`;
                
                // Sanani yangilash
                const day = String(now.getDate()).padStart(2, '0');
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const year = now.getFullYear();
                document.getElementById('live-date').innerText = `${day}.${month}.${year}`;
            }, 1000);
        }

        function toggleModal(show) {
            const modal = document.getElementById('product-modal');
            if(show) { modal.classList.add('active'); } 
            else {
                modal.classList.remove('active');
                document.getElementById('product-form').reset();
                document.getElementById('preview-container').style.display = "none";
                encodedImageBase64 = "";
            }
        }

        function switchCategory(cat, element) {
            currentCategory = cat;
            currentSubCategory = 'all';
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            renderSubCategories();
            filterAndRender();
        }

        function switchSubCategory(subCat, element) {
            currentSubCategory = subCat;
            document.querySelectorAll('.sub-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            filterAndRender();
        }

        function renderSubCategories() {
            const box = document.getElementById('sub-catalog-box');
            const list = subCategoriesMap[currentCategory];
            
            if(list && list.length > 0) {
                box.style.display = 'flex';
                let html = `<div class="sub-item active" onclick="switchSubCategory('all', this)">Barchasi</div>`;
                list.forEach(item => {
                    html += `<div class="sub-item" onclick="switchSubCategory('${item}', this)">${item}</div>`;
                });
                box.innerHTML = html;
            } else {
                box.style.display = 'none';
            }
        }

        function handleModalCategoryChange() {
            const cat = document.getElementById('p-category').value;
            const subSelect = document.getElementById('p-sub-category');
            const list = subCategoriesMap[cat];
            
            subSelect.innerHTML = '';
            if(list) {
                list.forEach(item => {
                    subSelect.innerHTML += `<option value="${item}">${item}</option>`;
                });
            } else {
                subSelect.innerHTML = `<option value="Umumiy">Umumiy</option>`;
            }
        }

        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    encodedImageBase64 = e.target.result;
                    document.getElementById('img-preview-src').src = encodedImageBase64;
                    document.getElementById('preview-container').style.display = "block";
                }
                reader.readAsDataURL(file);
            }
        }

        function saveProduct(e) {
            e.preventDefault();
            if(!encodedImageBase64) { alert("Rasm yuklang!"); return; }

            const now = new Date();
            const dateStr = `${String(now.getDate()).padStart(2, '0')}.${String(now.getMonth()+1).padStart(2, '0')}`;

            const newProd = {
                id: Date.now(),
                category: document.getElementById('p-category').value,
                subCategory: document.getElementById('p-sub-category').value || 'Umumiy',
                name: document.getElementById('p-name').value,
                img: encodedImageBase64,
                price: parseFloat(document.getElementById('p-price').value) || 0,
                stock: parseInt(document.getElementById('p-stock').value) || 0,
                date: dateStr
            };
            
            products.push(newProd);
            localStorage.setItem('imarket_premium_products', JSON.stringify(products));
            toggleModal(false);
            filterAndRender();
        }

        // MAHSULOTNI O'CHIRISH FUNKSIYASI (XATOLIKLARNI TO'G'IRLASH UCHUN)
        function deleteProduct(id) {
            if(confirm("Ushbu mahsulotni ro'yxatdan o'chirmoqchimiszt?")) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('imarket_premium_products', JSON.stringify(products));
                filterAndRender();
            }
        }

        function filterAndRender() {
            const container = document.getElementById('products-container');
            container.innerHTML = '';

            const searchQuery = document.getElementById('search-input').value.toLowerCase();
            const sortStyle = document.getElementById('price-sort').value;

            let filtered = products.filter(p => {
                const matchCat = (currentCategory === 'all' || p.category === currentCategory);
                const matchSub = (currentSubCategory === 'all' || p.subCategory === currentSubCategory);
                const matchSearch = p.name.toLowerCase().includes(searchQuery);
                return matchCat && matchSub && matchSearch;
            });

            if (sortStyle === 'low-high') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (sortStyle === 'high-low') {
                filtered.sort((a, b) => b.price - a.price);
            }

            filtered.forEach(p => {
                const formattedPrice = Number(p.price).toLocaleString('ru-RU') + " so'm";
                const html = `
                    <div class="product-card">
                        <div class="delete-btn" onclick="deleteProduct(${p.id})">
                            <i class="fa-solid fa-trash-can"></i>
                        </div>
                        <div class="img-box">
                            <img src="${p.img}" alt="${p.name}">
                            <div class="img-meta-panel">
                                <div class="meta-stock">Zaxira: ${p.stock} ta</div>
                                <div class="meta-price">${formattedPrice}</div>
                            </div>
                        </div>
                        <div class="info-box">
                            <div class="product-name">${p.name}</div>
                            <div class="meta-bottom">
                                <span class="sub-tag">${p.subCategory}</span>
                                <span class="date-tag"><i class="fa-regular fa-calendar-minus"></i> ${p.date || '--.--'}</span>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }
    </script>
</body>
</html>
