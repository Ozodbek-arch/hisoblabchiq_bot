<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMarket Premium Admin</title>
    <!-- Google Fonts va FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0b0b0c;
            --bg-card: #121214;
            --bg-input: #1a1a1e;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.06);
            
            --danger: #ff453a;
            --warning: #ff9f0a;
            --success: #30d158;
            
            --font-title: 'Space Grotesk', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Kirish Premium Animatsiyasi */
        #welcome-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.8s;
        }

        .welcome-logo {
            font-family: var(--font-title);
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            color: #ffffff;
            opacity: 0;
            transform: scale(0.95);
            animation: premiumBlurIn 1.2s forwards 0.2s;
        }

        .welcome-sub {
            color: var(--text-muted);
            margin-top: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeIn 1s forwards 0.8s;
        }

        @keyframes premiumBlurIn { to { opacity: 1; transform: scale(1); filter: blur(0); } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Asosiy Layout */
        header {
            background: rgba(11, 11, 12, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0; z-index: 100;
        }

        .header-wrap {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo {
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .search-container {
            position: relative;
            width: 100%;
            max-width: 450px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 18px 12px 45px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: var(--transition);
            font-size: 0.95rem;
        }

        .search-container input:focus {
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 0 4px rgba(255,255,255,0.03);
        }

        .search-container i {
            position: absolute;
            left: 16px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* YANGI: Rasmli/Ikonkali Premium Katalog Menyusi */
        .catalog-nav {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none;
        }
        .catalog-nav::-webkit-scrollbar { display: none; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            color: var(--text-muted);
        }

        .nav-item i {
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .nav-item.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(255,255,255,0.06);
        }
        
        .nav-item.active i {
            color: #000;
        }

        /* Ogohlantirishlar paneli */
        .alerts-wrapper {
            max-width: 1400px;
            margin: 20px auto 0 auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alert-card {
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .alert-card.warning { background: rgba(255, 159, 10, 0.06); border-color: rgba(255, 159, 10, 0.2); color: #ff9f0a; }
        .alert-card.danger { background: rgba(255, 69, 58, 0.06); border-color: rgba(255, 69, 58, 0.2); color: #ff453a; }

        @keyframes slideIn {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Mahsulotlar Grid */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* Mukammal Premium Karta */
        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        .product-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .img-box {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background: #16161a;
            overflow: hidden;
        }

        .img-box img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .product-card:hover .img-box img {
            transform: scale(1.05);
        }

        .img-meta-panel {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: linear-gradient(to top, rgba(18,18,20,0.95), rgba(18,18,20,0));
            padding: 20px 15px 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .meta-stock {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .meta-price {
            font-family: var(--font-title);
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
        }

        .info-box {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 15px;
        }

        .product-name {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: -0.2px;
            line-height: 1.4;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge.in-stock { color: var(--success); }
        .badge.out-stock { color: var(--text-muted); text-decoration: line-through; }

        /* Floating Actions & Modal */
        .fab {
            position: fixed;
            bottom: 35px; right: 35px;
            width: 60px; height: 60px;
            background: #ffffff;
            color: #000000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
            z-index: 99;
            transition: var(--transition);
        }
        .fab:hover { transform: scale(1.08) rotate(90deg); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0; visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-body {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 24px;
            width: 90%; max-width: 480px;
            transform: scale(0.95) translateY(10px);
            transition: var(--transition);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-body { transform: scale(1) translateY(0); }

        .modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-family: var(--font-title);
        }

        .close-btn { cursor: pointer; color: var(--text-muted); font-size: 1.2rem; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
        
        .form-group input, .form-group select {
            width: 100%; padding: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px; color: #fff; outline: none;
        }
        .form-group input:focus, .form-group select:focus { border-color: rgba(255,255,255,0.2); }

        /* Galereya va Kamera yuklash zonasi */
        .image-upload-zone {
            border: 2px dashed var(--border);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
            background: var(--bg-input);
            cursor: pointer;
            transition: var(--transition);
        }
        .image-upload-zone:hover {
            border-color: rgba(255,255,255,0.3);
        }
        .image-upload-zone i {
            font-size: 2rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .image-upload-zone p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .image-upload-zone input[type="file"] {
            display: none;
        }
        .preview-img-container {
            margin-top: 12px;
            display: none;
            width: 100%;
            height: 160px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        .preview-img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .btn-submit {
            width: 100%; padding: 14px;
            background: #fff; color: #000;
            border: none; border-radius: 10px;
            font-weight: 600; cursor: pointer;
            font-size: 0.95rem; transition: var(--transition);
        }
        .btn-submit:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <!-- Kirish Premium Animatsiyasi -->
    <div id="welcome-overlay">
        <div class="welcome-logo">iMarket</div>
        <div class="welcome-sub">Premium Management Suite</div>
    </div>

    <!-- Asosiy Interfeys -->
    <header>
        <div class="header-wrap">
            <div class="header-top">
                <div class="brand-logo">iMarket.</div>
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Mahsulot nomini qidirish..." oninput="filterProducts()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>
            
            <!-- YANGILANGAN: Chiroyli Rasmli Ikonkalar bilan Katalog Paneli -->
            <div class="catalog-nav">
                <div class="nav-item active" onclick="switchCategory('all', this)"><i class="fa-solid fa-border-all"></i> Barchasi</div>
                <div class="nav-item" onclick="switchCategory('chexol', this)"><i class="fa-solid fa-mobile-screen-button"></i> Chexol</div>
                <div class="nav-item" onclick="switchCategory('stiklo', this)"><i class="fa-solid fa-shield-halved"></i> Stiklo</div>
                <div class="nav-item" onclick="switchCategory('hid', this)"><i class="fa-solid fa-spray-can"></i> Hid chiqazuvchi</div>
                <div class="nav-item" onclick="switchCategory('soat', this)"><i class="fa-solid fa-clock"></i> Soat</div>
                <div class="nav-item" onclick="switchCategory('naushnik', this)"><i class="fa-solid fa-headphones"></i> Naushnik</div>
            </div>
        </div>
    </header>

    <!-- Avtomatik Smart Ogohlantirishlar -->
    <div class="alerts-wrapper" id="alerts-zone"></div>

    <!-- Mahsulotlar Ro'yxati -->
    <main class="container">
        <div class="products-grid" id="products-container"></div>
    </main>

    <!-- Qo'shish uchun Floating Button -->
    <div class="fab" onclick="toggleModal(true)"><i class="fa-solid fa-plus"></i></div>

    <!-- Boshqaruv Modali -->
    <div class="modal-overlay" id="product-modal">
        <div class="modal-body">
            <div class="modal-head">
                <h3>Yangi Mahsulot Kiritish</h3>
                <i class="fa-solid fa-xmark close-btn" onclick="toggleModal(false)"></i>
            </div>
            <form id="product-form" onsubmit="saveProduct(event)">
                <div class="form-group">
                    <label>Kategoriya</label>
                    <select id="p-category" required>
                        <option value="chexol">Chexol</option>
                        <option value="stiklo">Stiklo</option>
                        <option value="hid">Hid chiqazuvchi</option>
                        <option value="soat">Soat</option>
                        <option value="naushnik">Naushnik</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mahsulot Nomi</label>
                    <input type="text" id="p-name" required>
                </div>
                
                <!-- FAQAT GALEREYA VA KAMERA ORQALI RASM YUKLASH (URL YUQ) -->
                <div class="form-group">
                    <label>Mahsulot Rasmi</label>
                    <div class="image-upload-zone" onclick="document.getElementById('p-file').click()">
                        <i class="fa-solid fa-images"></i>
                        <p>Galereyadan rasm tanlang yoki kameraga oling</p>
                        <input type="file" id="p-file" accept="image/*" onchange="previewImage(this)" required>
                    </div>
                    <div class="preview-img-container" id="preview-container">
                        <img id="img-preview-src" src="" alt="Preview">
                    </div>
                </div>

                <div class="form-group">
                    <label>Narxi</label>
                    <input type="text" id="p-price" placeholder="Masalan: 120,000 so'm" required>
                </div>
                <div class="form-group">
                    <label>Soni (Omborda)</label>
                    <input type="number" id="p-stock" min="0" required>
                </div>
                <div class="form-group">
                    <label>Oylik Sotuv Soni (Statistika uchun)</label>
                    <input type="number" id="p-sales" value="0">
                </div>
                <button type="submit" class="btn-submit">Omborga Qo'shish</button>
            </form>
        </div>
    </div>

    <script>
        let currentCategory = 'all';
        let encodedImageBase64 = "";

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const overlay = document.getElementById('welcome-overlay');
                overlay.style.opacity = '0';
                overlay.style.visibility = 'hidden';
            }, 2000);

            renderProducts();
        });

        // Boshlang'ich misollar uchun tayyor rasmlar saqlangan xotira
        let products = JSON.parse(localStorage.getItem('imarket_premium_products')) || [
            { id: 1, category: 'chexol', name: "Silicone Case iPhone 15 Pro", img: "https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=500", price: "150,000 so'm", stock: 3, sales: 15 },
            { id: 2, category: 'soat', name: "Apple Watch Ultra Custom", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500", price: "6,500,000 so'm", stock: 12, sales: 0 }
        ];

        function saveToStorage() {
            localStorage.setItem('imarket_premium_products', JSON.stringify(products));
            renderProducts();
        }

        function toggleModal(show) {
            const modal = document.getElementById('product-modal');
            if(show) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
                document.getElementById('product-form').reset();
                document.getElementById('preview-container').style.display = "none";
                encodedImageBase64 = "";
            }
        }

        function switchCategory(cat, element) {
            currentCategory = cat;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            renderProducts();
        }

        // Galereyadan rasm tanlanganda ishlaydigan Base64 konverter
        function previewImage(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    encodedImageBase64 = e.target.result;
                    document.getElementById('img-preview-src').src = encodedImageBase64;
                    document.getElementById('preview-container').style.display = "block";
                }
                reader.readAsDataURL(file);
            }
        }

        function saveProduct(e) {
            e.preventDefault();
            
            if(!encodedImageBase64) {
                alert("Iltimos, galereyadan mahsulot rasmini tanlang!");
                return;
            }

            const newProd = {
                id: Date.now(),
                category: document.getElementById('p-category').value,
                name: document.getElementById('p-name').value,
                img: encodedImageBase64,
                price: document.getElementById('p-price').value,
                stock: parseInt(document.getElementById('p-stock').value),
                sales: parseInt(document.getElementById('p-sales').value) || 0
            };
            
            products.push(newProd);
            saveToStorage();
            toggleModal(false);
        }

        function renderProducts() {
            const container = document.getElementById('products-container');
            const alertsZone = document.getElementById('alerts-zone');
            container.innerHTML = '';
            alertsZone.innerHTML = '';

            products.forEach(p => {
                if (p.stock > 0 && p.stock <= 4) {
                    alertsZone.innerHTML += `<div class="alert-card warning"><i class="fa-solid fa-triangle-exclamation"></i> <span><b>${p.name}</b> tugab boryapti! Omborda atigi ${p.stock} ta qoldi.</span></div>`;
                }
                if (p.sales === 0 && p.stock > 0) {
                    alertsZone.innerHTML += `<div class="alert-card danger"><i class="fa-solid fa-arrow-trend-down"></i> <span><b>${p.name}</b> mahsuloti omborda turibdi lekin umuman sotilmayapti!</span></div>`;
                }

                if (currentCategory !== 'all' && p.category !== currentCategory) return;

                const isOut = p.stock === 0;

                const html = `
                    <div class="product-card">
                        <div class="img-box">
                            <img src="${p.img}" alt="${p.name}" onerror="this.src='https://placehold.co/400x400/1a1a1e/ffffff?text=Rasm+Mavjud+Emas'">
                            <div class="img-meta-panel">
                                <div class="meta-stock">Zaxira: ${p.stock} ta</div>
                                <div class="meta-price">${p.price}</div>
                            </div>
                        </div>
                        <div class="info-box">
                            <div class="product-name">${p.name}</div>
                            <div>
                                ${isOut ? 
                                    `<span class="badge out-stock"><i class="fa-solid fa-circle-xmark"></i> Sotuvda yo'q</span>` : 
                                    `<span class="badge in-stock"><i class="fa-solid fa-circle-check"></i> Sotuvda mavjud</span>`
                                }
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
        }

        function filterProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const cards = document.getElementsByClassName('product-card');
            
            let visibleIndex = 0;
            products.forEach((p, index) => {
                const matchCat = (currentCategory === 'all' || p.category === currentCategory);
                const matchQuery = p.name.toLowerCase().includes(query);

                if(matchCat && matchQuery) {
                    cards[visibleIndex].style.with = "flex";
                    cards[visibleIndex].style.display = "flex";
                    visibleIndex++;
                } else if (matchCat) {
                    cards[visibleIndex].style.display = "none";
                    visibleIndex++;
                }
            });
        }
    </script>
</body>
</html>
